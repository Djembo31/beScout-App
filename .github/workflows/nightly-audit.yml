name: Nightly Audit

# Slice 233 (2026-04-27): Erste autonome Self-Improvement-Schleife.
# Verkabelt 7 Audit-Scripts + bescout.net-Smoke-Test in eine GHA-Cron-Pipeline
# mit Auto-Issue-Creation. Adressiert Build-without-Wire-Pattern (8 Tools
# gebaut, 1 verkabelt vor diesem Slice).

on:
  schedule:
    - cron: '0 3 * * *'   # Audit-Job 03:00 UTC daily
    - cron: '0 4 * * *'   # Smoke-Job  04:00 UTC daily
  workflow_dispatch:       # Manual-Trigger ohne Wait-für-Cron

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  audit:
    # Run on manual dispatch OR auf 03:00-Cron (nicht auf 04:00 das ist smoke)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Brauchen wir für audit:stale-Diff-Detection (worklog/audits/)
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Sequenzielle Audits — continue-on-error: true sammelt Failures statt
      # früh zu brechen. Jeder Step hängt seinen Output an $GITHUB_STEP_SUMMARY.

      # Slice 233 Reviewer-Fix: PIPESTATUS-Bug. `tee` maskiert Exit-Code.
      # `${PIPESTATUS[0]}` extrahiert den ersten Pipe-Element-Exit (= pnpm),
      # `exit $EXIT` propagiert ihn an `continue-on-error` damit `steps.X.outcome`
      # korrekt failure/success ist.

      - name: Audit silent-fail (strict-mode)
        id: silent_fail
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:silent-fail:check 2>&1 | tee /tmp/silent-fail.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:silent-fail:check (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -50 /tmp/silent-fail.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit stale (D48-Catcher)
        id: stale
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:stale 2>&1 | tee /tmp/stale.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:stale (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/stale.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit orphan (D46-Component-Achse)
        id: orphan
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:orphan 2>&1 | tee /tmp/orphan.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:orphan (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/orphan.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit type-truth (D43)
        id: type_truth
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:type-truth 2>&1 | tee /tmp/type-truth.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:type-truth (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/type-truth.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit mutation-race (strict-mode)
        id: mutation_race
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:mutation-race:check 2>&1 | tee /tmp/mutation-race.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:mutation-race:check (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/mutation-race.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit i18n-coverage
        id: i18n
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:i18n 2>&1 | tee /tmp/i18n.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:i18n (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/i18n.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit rpc-security
        id: rpc_security
        shell: bash
        continue-on-error: true
        # Slice 234 Heal: env-block aus ci.yml — script needs Supabase keys, sonst Skip-Path
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pnpm run audit:rpc-security 2>&1 | tee /tmp/rpc-security.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:rpc-security (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/rpc-security.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit tr-strings
        id: tr_strings
        shell: bash
        continue-on-error: true
        # Slice 234 Heal: tr-strings braucht qa-screenshots/synthetic/profile-c-tr-locale/tr-strings.txt
        # → skip-graceful wenn Datei fehlt (kein Failure → exit 0)
        run: |
          DUMP="qa-screenshots/synthetic/profile-c-tr-locale/tr-strings.txt"
          if [ ! -f "$DUMP" ]; then
            echo "## audit:tr-strings (skipped: $DUMP missing — run pnpm run test:synthetic to generate)" >> $GITHUB_STEP_SUMMARY
            echo "tr-strings audit skipped: dump file missing" > /tmp/tr-strings.log
            exit 0
          fi
          pnpm run audit:tr-strings 2>&1 | tee /tmp/tr-strings.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:tr-strings (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/tr-strings.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit compliance (Slice 234 — was orphan)
        id: compliance
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:compliance 2>&1 | tee /tmp/compliance.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:compliance (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/compliance.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit wiring (Slice 234 — Drift-Detection)
        id: wiring
        shell: bash
        continue-on-error: true
        run: |
          pnpm run audit:wiring 2>&1 | tee /tmp/wiring.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:wiring (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/wiring.log >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Audit cron-health (Slice 255 — Cron-Pipeline-Reliability)
        id: cron_health
        shell: bash
        continue-on-error: true
        env:
          # Slice 255 Heal (Reviewer F-3, P2) — Secret-Name harmonisiert mit
          # rpc-security-step (line 118): NEXT_PUBLIC_SUPABASE_URL als GHA-secret.
          # Pre-Heal: secrets.SUPABASE_URL → silent-skip wenn Secret nicht registered.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          pnpm run audit:cron-health 2>&1 | tee /tmp/cron-health.log
          EXIT=${PIPESTATUS[0]}
          echo "## audit:cron-health (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/cron-health.log >> $GITHUB_STEP_SUMMARY
          # Slice 257 F-4: exit-Code propagieren statt hard-`exit 0`.
          # continue-on-error:true verhindert Workflow-Abbruch, aber
          # steps.cron_health.outcome=failure triggert Auto-Issue-Title
          # explizit (statt im "new audit-reports"-Bucket zu verschwinden).
          exit $EXIT

      - name: Findings → Slices Pipeline (Slice 214/234)
        id: findings_pipeline
        shell: bash
        continue-on-error: true
        run: |
          # Aggregiert Audit-Findings → Slice-Stubs in worklog/specs/_pending/
          # Slice 214 Pipeline, Slice 234 verkabelt.
          if [ -f scripts/findings-to-slices.ts ]; then
            npx tsx scripts/findings-to-slices.ts 2>&1 | tee /tmp/findings-pipeline.log
            EXIT=${PIPESTATUS[0]}
            echo "## findings-to-slices (exit: $EXIT)" >> $GITHUB_STEP_SUMMARY
            tail -30 /tmp/findings-pipeline.log >> $GITHUB_STEP_SUMMARY
            exit $EXIT
          else
            echo "findings-to-slices.ts not found, skip" > /tmp/findings-pipeline.log
            exit 0
          fi

      - name: Detect new audit-reports (Diff-based Findings)
        id: report_diff
        run: |
          # worklog/audits/ wird von Audit-Scripts beschrieben.
          # Wenn neue Files seit fetch-depth=2 → Findings.
          NEW_REPORTS=$(git status --short worklog/audits/ 2>/dev/null | wc -l)
          echo "new_reports=$NEW_REPORTS" >> $GITHUB_OUTPUT
          if [ "$NEW_REPORTS" -gt 0 ]; then
            echo "## Neue Audit-Report-Files (worklog/audits/)" >> $GITHUB_STEP_SUMMARY
            git status --short worklog/audits/ >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Aggregate failure-detection
        id: aggregate
        run: |
          FAILURES=""
          [ "${{ steps.silent_fail.outcome }}" = "failure" ] && FAILURES="$FAILURES silent-fail;"
          [ "${{ steps.stale.outcome }}" = "failure" ] && FAILURES="$FAILURES stale;"
          [ "${{ steps.orphan.outcome }}" = "failure" ] && FAILURES="$FAILURES orphan;"
          [ "${{ steps.type_truth.outcome }}" = "failure" ] && FAILURES="$FAILURES type-truth;"
          [ "${{ steps.mutation_race.outcome }}" = "failure" ] && FAILURES="$FAILURES mutation-race;"
          [ "${{ steps.i18n.outcome }}" = "failure" ] && FAILURES="$FAILURES i18n;"
          [ "${{ steps.rpc_security.outcome }}" = "failure" ] && FAILURES="$FAILURES rpc-security;"
          [ "${{ steps.tr_strings.outcome }}" = "failure" ] && FAILURES="$FAILURES tr-strings;"
          [ "${{ steps.compliance.outcome }}" = "failure" ] && FAILURES="$FAILURES compliance;"
          [ "${{ steps.wiring.outcome }}" = "failure" ] && FAILURES="$FAILURES wiring;"
          [ "${{ steps.cron_health.outcome }}" = "failure" ] && FAILURES="$FAILURES cron-health;"
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          if [ -n "$FAILURES" ] || [ "${{ steps.report_diff.outputs.new_reports }}" != "0" ]; then
            echo "should_alert=true" >> $GITHUB_OUTPUT
          else
            echo "should_alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Issue on findings (Slice 234 — Issue-Dedupe)
        if: steps.aggregate.outputs.should_alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failures = '${{ steps.aggregate.outputs.failures }}'.trim();
            const newReports = '${{ steps.report_diff.outputs.new_reports }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            const tools = ['silent-fail', 'stale', 'orphan', 'type-truth', 'mutation-race', 'i18n', 'rpc-security', 'tr-strings', 'compliance', 'wiring', 'cron-health'];
            const sections = tools.map(t => {
              try {
                const log = fs.readFileSync(`/tmp/${t}.log`, 'utf-8');
                const tail = log.split('\n').slice(-30).join('\n');
                return `### ${t}\n\n\`\`\`\n${tail}\n\`\`\`\n`;
              } catch (e) { return ''; }
            }).filter(Boolean).join('\n');

            const title = `🔍 Nightly Audit ${today}: ${failures || 'new reports'}`;
            const body = [
              `**Run:** ${runUrl}`,
              `**Failed Audits:** ${failures || '(none — but new audit-report files detected)'}`,
              `**New Audit-Report-Files in worklog/audits/:** ${newReports}`,
              ``,
              `Slice 233/234 Self-Improvement-Loop entdeckte folgende Findings.`,
              `Bei false-positive: Issue schließen + audit-Script anpassen.`,
              `Bei echte Findings: Slice in worklog/specs/ planen, Findings closen.`,
              ``,
              `---`,
              ``,
              sections,
            ].join('\n');

            // Slice 234 Issue-Dedupe: check if a today-issue with same title already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-audit',
              state: 'open',
              per_page: 30,
            });
            const sameTitleIssue = existing.data.find(i => i.title.startsWith(`🔍 Nightly Audit ${today}`));

            if (sameTitleIssue) {
              // Update existing issue with comment instead of creating duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: sameTitleIssue.number,
                body: `**Re-Run:** ${runUrl}\n**Updated Failed Audits:** ${failures || '(none — but new audit-report files detected)'}\n\n${sections}`,
              });
              console.log(`Updated existing issue #${sameTitleIssue.number} (dedupe)`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['audit-finding', 'nightly-audit'],
              });
              console.log(`Created new issue for ${today}`);
            }

  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps

      - name: Run Smoke Suite against bescout.net
        id: smoke
        env:
          PLAYWRIGHT_BASE_URL: https://bescout.net
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: pnpm exec playwright test --project=smoke --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Create Issue on smoke failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly Smoke ${today} fehlgeschlagen gegen bescout.net`,
              body: [
                `**Run:** ${runUrl}`,
                `**Target:** https://bescout.net`,
                ``,
                `Eines der 10 Smoke-Flows hat fehlgeschlagen. Playwright-Report-Artifact am Run.`,
                ``,
                `Mögliche Ursachen:`,
                `- Vercel-Outage / 503`,
                `- Live-Drift im Code seit letztem Push`,
                `- Test-Account locked oder Cookie-Drift`,
                `- Selektor-Drift (Component-Refactor ohne Smoke-Update)`,
                ``,
                `Bei false-positive: 1× retry via "Re-run failed jobs" im GHA-UI.`,
                `Bei persistent-Fail: Beta-Blocker, Issue weiter triagen.`,
              ].join('\n'),
              labels: ['beta-blocker', 'smoke-fail', 'nightly-audit'],
            });
