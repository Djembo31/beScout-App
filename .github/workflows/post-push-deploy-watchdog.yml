name: Post-Push Vercel-Deploy Watchdog

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip docs-only commits (they don't require new deploys)
    if: |
      !contains(github.event.head_commit.message, 'docs(hygiene)') &&
      !contains(github.event.head_commit.message, 'docs(session)') &&
      !startsWith(github.event.head_commit.message, 'docs(')
    steps:
      - name: Wait 5 minutes for Vercel to deploy
        run: sleep 300

      - name: Check Vercel for this commit SHA
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -u

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "::warning::VERCEL_TOKEN secret not configured — watchdog skipped."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          URL="https://api.vercel.com/v6/deployments?limit=30&target=production"
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then
            URL="${URL}&teamId=${VERCEL_TEAM_ID}"
          fi

          RESPONSE=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" "$URL")

          if echo "$RESPONSE" | grep -q "\"meta\"" && \
             echo "$RESPONSE" | grep -q "\"githubCommitSha\":\"$COMMIT_SHA\""; then
            echo "::notice::Deploy found for $COMMIT_SHA — Vercel auto-deploy working."
            echo "missing=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::No Vercel deployment found for commit $COMMIT_SHA after 5 minutes."
          echo "missing=true" >> "$GITHUB_OUTPUT"

      - name: Create Issue on Missing Deploy
        if: steps.check.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const fullSha = context.sha;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitMsg = context.payload.head_commit?.message?.split('\n')[0] ?? 'unknown';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Vercel Auto-Deploy missing for ${sha}`,
              body: [
                `## Post-Push Watchdog Alert`,
                ``,
                `No Vercel deployment was found for this commit **5 minutes after push**. This likely means Vercel's auto-deploy is silently broken.`,
                ``,
                `**Commit:** ${fullSha}`,
                `**Message:** \`${commitMsg}\``,
                `**Watchdog run:** ${runUrl}`,
                ``,
                `## Likely causes`,
                ``,
                `1. **Hobby-Tier cron rejection** — hourly cron schedules (\`0 * * * *\`) are Pro-only. Check \`vercel.json\` for offending entries.`,
                `2. **Build-config validation fail** — \`next.config\`, \`vercel.json\`, or env var issues.`,
                `3. **Webhook drop** — rare, but possible. Retry manual deploy.`,
                ``,
                `## Recovery protocol (D36)`,
                ``,
                `1. Local check: \`mcp__vercel__list_deployments\` — confirm SHA missing.`,
                `2. Foreground deploy: \`vercel deploy --prod --yes\` — shows the actual error message.`,
                `3. Fix the offending config and re-push.`,
                ``,
                `See \`memory/decisions.md\` D36 for the full protocol.`,
                ``,
                `---`,
                `*This issue is auto-closed when the next deployment for this branch succeeds.*`,
              ].join('\n'),
              labels: ['deploy-watchdog', 'infra', 'auto-generated'],
            });
